  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #1a1a1a;
      --border: #333;
      --text: #f0f0f0;
      --muted: #777;
      --online: #2ecc71;
      --offline: #e74c3c;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    /* INTRO ANIMATION */
    #introOverlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeOutIntro 0.8s 4s forwards;
    }
    #introCanvas {
      width: 300px;
      height: 300px;
    }
    #introText {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-size: 60px;
      letter-spacing: 15px;
      color: #fff;
      opacity: 0;
      animation: showText 0.8s 2s forwards;
      text-shadow: 0 0 30px rgba(255,255,255,0.8);
    }
    @keyframes showText {
      to { opacity: 1; letter-spacing: 8px; }
    }
    @keyframes fadeOutIntro {
      to { opacity: 0; visibility: hidden; }
    }
    .header {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: none;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-size: 28px;
      letter-spacing: 4px;
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .screen.active { display: flex; }
    .user-tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 20px;
      max-width: 500px;
      margin: 30px auto;
    }
    .user-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: 0.2s;
    }
    .user-tile:hover { border-color: #fff; }
    .tile-avatar {
      width: 80px; height: 80px;
      border-radius: 20%;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
      color: #fff;
      overflow: hidden;
    }
    .tile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .tile-name { font-size: 16px; font-weight: 600; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      width: 100%;
    }
    .input:focus { border-color: #fff; }
    .btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 12px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.2s;
      letter-spacing: 1px;
    }
    .btn:hover { opacity: 0.85; }
    .btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .error-msg {
      color: var(--offline);
      font-size: 13px;
      display: none;
      text-align: center;
    }
    .nav-bar {
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      height: 60px;
      align-items: center;
      justify-content: space-around;
    }
    .nav-item {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 8px 12px;
      letter-spacing: 1px;
    }
    .nav-item.active { color: #fff; border-bottom: 2px solid #fff; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .content-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      aspect-ratio: 1/1;
      overflow: hidden;
    }
    .content-card img, .content-card video {
      width: 100%; height: 100%; object-fit: cover;
    }
    .reel-container {
      height: calc(100vh - 140px);
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }
    .reel-item {
      scroll-snap-align: start;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-bottom: 1px solid var(--border);
    }
    .reel-item video { width: 100%; max-height: 100%; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 0;
    }
    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 14px;
    }
    .msg.own { align-self: flex-end; background: #fff; color: #000; }
    .chat-input-area { display: flex; gap: 8px; }
    .user-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .file-label {
      border: 1px dashed var(--border);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      border-radius: var(--radius);
    }
    .small-text { font-size: 13px; color: var(--muted); }
    hr { border: 0.5px solid var(--border); margin: 10px 0; }
  </style>
</head>
<body>

  <!-- INTRO SPLASH -->

  <!-- HEADER -->

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen active">

      <div id="userTilesContainer" class="user-tile-grid"></div>
      <a id="pedirCuentaBtn" class="btn secondary" style="margin:10px; display:inline-block; text-decoration:none;"
         href="https://wa.me/50668405099?text=Hola,%20quiero%20una%20cuenta%20en%20DAZER" target="_blank">
        PEDIR CUENTA
      </a>
      <div style="margin-top:20px;">
        <button class="btn secondary" id="openAdminLink" style="font-size:12px; opacity:0.6;">Admin</button>
      </div>

  <!-- MODAL: CONTRASENA DE PERFIL -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal-box">
      <h3 style="letter-spacing:2px;">CONTRASENA</h3>
      <input type="password" class="input" id="profilePassInput" placeholder="Contrasena">

  <!-- MODAL: PANEL ADMIN -->
  <div class="modal-overlay" id="adminModal">

      <h3 style="letter-spacing:2px;">ADMIN</h3>
      <input type="password" class="input" id="adminCodeInput" placeholder="Codigo maestro">
      <button class="btn" id="verifyAdminBtn">VERIFICAR</button>
      <div class="error-msg" id="adminError"></div>
      <div id="createForm" style="display:none; flex-direction:column; gap:12px;">
        <input type="text" class="input" id="newUsername" placeholder="Nombre de usuario">
        <div style="display:flex; gap:8px;">
          <select class="input" id="daySelect" style="flex:1;"></select>
          <select class="input" id="monthSelect" style="flex:1;"></select>
          <select class="input" id="yearSelect" style="flex:1;"></select>
        </div>
        <input type="password" class="input" id="newPassword" placeholder="Contrasena del usuario">
        <button class="btn" id="createUserBtn">CREAR USUARIO</button>
        <div class="error-msg" id="createError"></div>
      </div>
      <button class="btn secondary" id="closeAdminModal">CANCELAR</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" style="display:none; flex:1; flex-direction:column;">
    <!-- NAVEGAR -->
    <div id="navegarScreen" class="screen active">
      <div class="grid" id="contentGrid"></div>
    </div>
    <!-- REELS -->
    <div id="reelsScreen" class="screen">
      <div class="reel-container" id="reelContainer"></div>
      <div style="padding:8px; text-align:center;">
        <label class="file-label" for="reelUploadInput">Subir reel</label>
        <input type="file" id="reelUploadInput" accept="video/*" style="display:none;" onchange="uploadReel()">
      </div>
    </div>
    <!-- CHAT -->
    <div id="chatScreen" class="screen">
      <input type="text" class="input" id="chatSearchUser" placeholder="Buscar usuario..." style="margin-bottom:10px;">
      <div id="chatUserList"></div>
      <div id="chatWindow" style="display:none; flex:1; flex-direction:column;">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <input type="text" class="input" id="chatInput" placeholder="Mensaje..." style="flex:1;">
          <button class="btn" id="sendMsgBtn" style="padding:10px 16px;">ENVIAR</button>
        </div>
      </div>

    <!-- PERFIL -->
    <div id="perfilScreen" class="screen">
      <div style="background:var(--surface); padding:16px; border-radius:var(--radius); margin-bottom:16px;">
        <p><strong>Usuario:</strong> <span id="profileUsername"></span></p>
        <p><strong>Email:</strong> <span id="profileEmail"></span></p>
        <p><strong>Nacimiento:</strong> <span id="profileBirth"></span></p>
        <label class="file-label" for="profilePicInput">Cambiar foto de perfil</label>
        <input type="file" id="profilePicInput" accept="image/*" style="display:none;" onchange="uploadProfilePic()">
        <br>
        <label for="tileColorInput">Color de tu ficha:</label>
        <input type="color" id="tileColorInput" value="#2a2a2a" style="width:100%; margin-top:5px;">
        <button class="btn secondary" id="saveTileColorBtn" style="margin-top:5px;">Guardar color</button>
      </div>
      <hr>
      <label class="file-label" for="stickerUploadInput">Subir sticker</label>
      <input type="file" id="stickerUploadInput" accept="image/*" style="display:none;" onchange="uploadSticker()">
      <hr>
      <p class="small-text">Tus stickers:</p>
      <div class="grid" id="profileStickers"></div>
    </div>
    <!-- IA (ERROR) -->
    <div id="iaScreen" class="screen">
      <div style="margin:auto; text-align:center; color:var(--muted);">
        <p style="font-size:48px; letter-spacing:4px;">[ IA ]</p>
        <p>ERROR: modulo no disponible</p>
      </div>
    </div>

    <!-- NAV BAR -->
    <div class="nav-bar">
      <button class="nav-item active" data-screen="navegarScreen">NAVEGAR</button>
      <button class="nav-item" data-screen="reelsScreen">REELS</button>
      <button class="nav-item" data-screen="chatScreen">CHAT</button>
      <button class="nav-item" data-screen="perfilScreen">PERFIL</button>
      <button class="nav-item" data-screen="iaScreen">IA</button>
    </div>
  </div>

  <script>
    // ==================== DATABASE ====================
    const STORAGE = 'dazer_db';
    const MASTER_CODE = '29112009';
    let DB = { users: {}, chats: {}, globalReels: [] };
    let currentUser = null;

    function saveDB() { localStorage.setItem(STORAGE, JSON.stringify(DB)); }
    function loadDB() {
      let s = localStorage.getItem(STORAGE);
      if (s) { try { DB = JSON.parse(s); } catch(e) { resetDB(); } }
      else resetDB();
    }
    function resetDB() { DB = { users: {}, chats: {}, globalReels: [] }; saveDB(); }

    // ==================== INTRO ANIMATION ====================
    (function drawIntro() {
      const canvas = document.getElementById('introCanvas');
      const ctx = canvas.getContext('2d');
      let alpha = 0, size = 50;
      function animate() {
        ctx.clearRect(0,0,300,300);
        // Drawing D with fire effect (simulated with glowing arcs)
        ctx.save();
        ctx.translate(150,150);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 180px Impact';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 30 + Math.sin(Date.now()*0.02)*10;
        ctx.fillText('D', 0, 0);
        // Fire ring
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 3 + Math.random()*2;
        ctx.shadowBlur = 20;
        for(let i=0; i<8; i++) {
          let angle = (i/8)*Math.PI*2 + Date.now()*0.005;
          let rx = Math.cos(angle)*80, ry = Math.sin(angle)*80;
          ctx.beginPath();
          ctx.arc(rx, ry, 15+Math.random()*10, 0, Math.PI*2);
          ctx.stroke();
        }
        ctx.restore();
        requestAnimationFrame(animate);
      }
      animate();
    })();

    // ==================== UI HELPERS ====================
    function showScreen(id) {
      document.querySelectorAll('#mainApp .screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id === 'navegarScreen') renderBrowseGrid();
      if (id === 'reelsScreen') renderReels();
      if (id === 'chatScreen') renderChatUserList();
      if (id === 'perfilScreen') renderProfile();
    }

    // ==================== LOGIN & TILES ====================
    function renderUserTiles() {
      let container = document.getElementById('userTilesContainer');
      container.innerHTML = '';
      let users = Object.values(DB.users);
      if (users.length === 0) {
        container.innerHTML = '<p style="color:var(--muted);">No hay cuentas aun. Pide una.</p>';
        return;
      }
      users.forEach(user => {
        let tile = document.createElement('div');
        tile.className = 'user-tile';
        tile.style.backgroundColor = user.tileColor || '#2a2a2a';
        tile.innerHTML = `
          <div class="tile-avatar">
            ${user.profilePic ? `<img src="${user.profilePic}">` : user.username[0].toUpperCase()}
          </div>
          <div class="tile-name">${user.username}</div>
        `;
        tile.addEventListener('click', () => openLoginModal(user.username));
        container.appendChild(tile);
      });
    }

    let pendingLogin = null;
    function openLoginModal(username) {
      pendingLogin = username;
      document.getElementById('profilePassInput').value = '';
      document.getElementById('loginModalError').style.display = 'none';
      document.getElementById('loginModal').classList.add('active');
    }
    document.getElementById('confirmLoginBtn').addEventListener('click', () => {
      let pass = document.getElementById('profilePassInput').value;
      if (!pendingLogin) return;
      let user = DB.users[pendingLogin];
      if (user && user.password === pass) {
        loginUser(pendingLogin);
        document.getElementById('loginModal').classList.remove('active');
      } else {
        document.getElementById('loginModalError').textContent = 'Contrasena incorrecta';
        document.getElementById('loginModalError').style.display = 'block';
        setTimeout(() => document.getElementById('loginModalError').style.display = 'none', 3000);
      }
    });
    document.getElementById('cancelLoginBtn').addEventListener('click', () => {
      document.getElementById('loginModal').classList.remove('active');
    });

    function loginUser(username) {
      currentUser = username;
      DB.users[username].online = true;
      Object.values(DB.users).forEach(u => u.online = false);
      DB.users[username].online = true;
      saveDB();
      document.getElementById('loginScreen').classList.remove('active');
      document.getElementById('appHeader').style.display = 'flex';
      document.getElementById('mainApp').style.display = 'flex';
      document.getElementById('headerUsername').textContent = username;
      document.getElementById('headerStatusDot').style.background = 'var(--online)';
      showScreen('navegarScreen');
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      if (currentUser) { DB.users[currentUser].online = false; saveDB(); }
      currentUser = null;
      document.getElementById('loginScreen').classList.add('active');
      document.getElementById('appHeader').style.display = 'none';
      document.getElementById('mainApp').style.display = 'none';
      renderUserTiles();
    });

    // ==================== ADMIN PANEL ====================
    document.getElementById('openAdminLink').addEventListener('click', () => {
      document.getElementById('adminModal').classList.add('active');
      document.getElementById('adminCodeInput').value = '';
      document.getElementById('createForm').style.display = 'none';
    });
    document.getElementById('closeAdminModal').addEventListener('click', () => {
      document.getElementById('adminModal').classList.remove('active');
    });
    document.getElementById('verifyAdminBtn').addEventListener('click', () => {
      if (document.getElementById('adminCodeInput').value === MASTER_CODE) {
        document.getElementById('createForm').style.display = 'flex';
        populateDateSelectors();
      } else {
        document.getElementById('adminError').textContent = 'Codigo incorrecto';
        document.getElementById('adminError').style.display = 'block';
        setTimeout(() => document.getElementById('adminError').style.display = 'none', 3000);
      }
    });

    function populateDateSelectors() {
      ['daySelect','monthSelect','yearSelect'].forEach(id => {
        let sel = document.getElementById(id);
        sel.innerHTML = '';
        if (id === 'daySelect') for(let i=1;i<=31;i++) sel.innerHTML += `<option value="${i}">${i}</option>`;
        if (id === 'monthSelect') {
          ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'].forEach((m,i) => sel.innerHTML += `<option value="${i+1}">${m}</option>`);
        }
        if (id === 'yearSelect') {
          let y = new Date().getFullYear();
          for(let i=y; i>=y-100; i--) sel.innerHTML += `<option value="${i}">${i}</option>`;
        }
      });
    }

    document.getElementById('createUserBtn').addEventListener('click', () => {
      let username = document.getElementById('newUsername').value.trim();
      let password = document.getElementById('newPassword').value.trim();
      let day = document.getElementById('daySelect').value;
      let month = document.getElementById('monthSelect').value;
      let year = document.getElementById('yearSelect').value;
      if (!username || !password) {
        document.getElementById('createError').textContent = 'Completa los campos';
        document.getElementById('createError').style.display = 'block';
        setTimeout(() => document.getElementById('createError').style.display = 'none', 3000);
        return;
      }
      if (DB.users[username]) {
        document.getElementById('createError').textContent = 'Usuario ya existe';
        document.getElementById('createError').style.display = 'block';
        setTimeout(() => document.getElementById('createError').style.display = 'none', 3000);
        return;
      }
      DB.users[username] = {
        username, password,
        birth: `${day}/${month}/${year}`,
        email: `${username}@dazerpost.com`,
        stickers: [], reels: [],
        online: false,
        profilePic: null,
        tileColor: '#2a2a2a'
      };
      saveDB();
      document.getElementById('newUsername').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('createForm').style.display = 'none';
      document.getElementById('adminModal').classList.remove('active');
      renderUserTiles();
    });

    // ==================== NAVIGATION ====================
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        showScreen(btn.dataset.screen);
      });
    });

    // ==================== PERFIL ====================
    function renderProfile() {
      if (!currentUser) return;
      let user = DB.users[currentUser];
      document.getElementById('profileUsername').textContent = user.username;
      document.getElementById('profileEmail').textContent = user.email;
      document.getElementById('profileBirth').textContent = user.birth;
      document.getElementById('tileColorInput').value = user.tileColor || '#2a2a2a';
      let stickersDiv = document.getElementById('profileStickers');
      stickersDiv.innerHTML = '';
      if (user.stickers.length) {
        user.stickers.forEach(dataUrl => {
          let card = document.createElement('div');
          card.className = 'content-card';
          let img = document.createElement('img');
          img.src = dataUrl;
          card.appendChild(img);
          stickersDiv.appendChild(card);
        });
      } else stickersDiv.innerHTML = '<p class="small-text">Sin stickers</p>';
    }

    window.uploadProfilePic = function() {
      let file = document.getElementById('profilePicInput').files[0];
      if (!file || !currentUser) return;
      let reader = new FileReader();
      reader.onload = e => {
        DB.users[currentUser].profilePic = e.target.result;
        saveDB();
        renderUserTiles();
      };
      reader.readAsDataURL(file);
    };
    document.getElementById('saveTileColorBtn').addEventListener('click', () => {
      DB.users[currentUser].tileColor = document.getElementById('tileColorInput').value;
      saveDB();
      renderUserTiles();
    });
    window.uploadSticker = function() {
      let file = document.getElementById('stickerUploadInput').files[0];
      if (!file || !currentUser) return;
      let reader = new FileReader();
      reader.onload = e => {
        DB.users[currentUser].stickers.push(e.target.result);
        saveDB();
        renderProfile();
        renderBrowseGrid();
      };
      reader.readAsDataURL(file);
    };

    // ==================== REELS ====================
    window.uploadReel = function() {
      let file = document.getElementById('reelUploadInput').files[0];
      if (!file || !currentUser) return;
      let reader = new FileReader();
      reader.onload = e => {
        DB.globalReels.push({ username: currentUser, videoDataUrl: e.target.result });
        DB.users[currentUser].reels.push(e.target.result);
        saveDB();
        renderReels();
        renderBrowseGrid();
      };
      reader.readAsDataURL(file);
    };
    function renderReels() {
      let container = document.getElementById('reelContainer');
      container.innerHTML = '';
      if (!DB.globalReels.length) {
        container.innerHTML = '<p class="small-text" style="text-align:center; margin-top:40px;">No hay reels</p>';
        return;
      }
      DB.globalReels.forEach(reel => {
        let item = document.createElement('div');
        item.className = 'reel-item';
        let video = document.createElement('video');
        video.src = reel.videoDataUrl;
        video.controls = true;
        video.loop = true;
        video.setAttribute('playsinline', '');
        item.appendChild(video);
        container.appendChild(item);
      });
    }

    // ==================== NAVEGAR ====================
    function renderBrowseGrid() {
      let grid = document.getElementById('contentGrid');
      grid.innerHTML = '';
      let all = [];
      Object.values(DB.users).forEach(u => {
        if (u.stickers) u.stickers.forEach(d => all.push({ type:'sticker', dataUrl:d }));
      });
      DB.globalReels.forEach(r => all.push({ type:'reel', dataUrl:r.videoDataUrl }));
      if (!all.length) { grid.innerHTML = '<p class="small-text">Sin contenido</p>'; return; }
      all.forEach(item => {
        let card = document.createElement('div');
        card.className = 'content-card';
        if (item.type === 'sticker') {
          let img = document.createElement('img');
          img.src = item.dataUrl;
          card.appendChild(img);
        } else {
          let video = document.createElement('video');
          video.src = item.dataUrl;
          video.muted = true;
          video.autoplay = true;
          video.loop = true;
          card.appendChild(video);
        }
        grid.appendChild(card);
      });
    }

    // ==================== CHAT ====================
    function renderChatUserList() {
      let list = document.getElementById('chatUserList');
      let search = document.getElementById('chatSearchUser').value.toLowerCase();
      list.innerHTML = '';
      Object.values(DB.users).forEach(u => {
        if (u.username === currentUser || (search && !u.username.toLowerCase().includes(search))) return;
        let card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML = `
          <div class="tile-avatar" style="width:40px;height:40px;border-radius:50%;">
            ${u.profilePic ? `<img src="${u.profilePic}">` : u.username[0].toUpperCase()}
          </div>
          <div style="flex:1;">
            <strong>${u.username}</strong>
            <div><span class="status-dot" style="background:${u.online?'var(--online)':'var(--offline)'};"></span>${u.online?'En linea':'No en linea'}</div>
          </div>
        `;
        card.addEventListener('click', () => openChat(u.username));
        list.appendChild(card);
      });
    }
    document.getElementById('chatSearchUser').addEventListener('input', renderChatUserList);

    function openChat(withUser) {
      document.getElementById('chatWindow').style.display = 'flex';
      document.getElementById('chatWindow').dataset.with = withUser;
      renderMessages(withUser);
    }
    function getChatKey(a,b) { return [a,b].sort().join('|'); }
    function renderMessages(withUser) {
      let key = getChatKey(currentUser, withUser);
      let msgs = DB.chats[key] || [];
      let container = document.getElementById('chatMessages');
      container.innerHTML = '';
      msgs.forEach(m => {
        let div = document.createElement('div');
        div.className = 'msg' + (m.from === currentUser ? ' own' : '');
        div.textContent = m.text;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }
    document.getElementById('sendMsgBtn').addEventListener('click', () => {
      let withUser = document.getElementById('chatWindow').dataset.with;
      let text = document.getElementById('chatInput').value.trim();
      if (!withUser || !text) return;
      let key = getChatKey(currentUser, withUser);
      if (!DB.chats[key]) DB.chats[key] = [];
      DB.chats[key].push({ from: currentUser, text, time: Date.now() });
      saveDB();
      document.getElementById('chatInput').value = '';
      renderMessages(withUser);
    });

    // ==================== INIT ====================
    window.addEventListener('load', () => {
      loadDB();
      renderUserTiles();
      // start with login screen visible after intro (intro fades out)
      document.getElementById('loginScreen').classList.add('active');
      document.getElementById('appHeader').style.display = 'none';
      document.getElementById('mainApp').style.display = 'none';
      populateDateSelectors();
    });

    // PWA dummy SW
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('data:application/javascript;base64,' + btoa(
        'self.addEventListener("fetch",e=>{e.respondWith(fetch(e.request))});self.addEventListener("install",e=>{self.skipWaiting()});'
      )).catch(()=>{});
    }
  </script>
</body>
</html>
